name: Build and Deploy Azure Function

on:
  push:
    branches:
      - main

env:
  AZURE_FUNCTIONAPP_NAME: 'dev-fa-poc-eu2-02'
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "ERROR: dist/ directory not found. Build may have failed."
            exit 1
          fi
          if [ -z "$(ls -A dist/src/functions 2>/dev/null)" ]; then
            echo "ERROR: No compiled function files found in dist/src/functions/."
            exit 1
          fi
          echo "Build verification passed."

      - name: Prune dev dependencies
        run: npm prune --production

      - name: Create deployment zip
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "src/*" \
            --exclude "tsconfig.json" \
            --exclude "local.settings.json" \
            --exclude "azurite_data/*" \
            --exclude ".github/*"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        run: |
          az functionapp deploy \
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --src-path deploy.zip \
            --type zip
